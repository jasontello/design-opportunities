name: README check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  readme-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Regenerate README
        run: python3 scripts/generate_readme.py
      - name: Ensure README is up to date
        run: git diff --exit-code README.md
