name: Daily internship refresh

on:
  schedule:
    - cron: "15 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Refresh internships from official company boards
        env:
          LOOKBACK_DAYS: "14"
          CLOSED_RETENTION_DAYS: "30"
          REQUEST_TIMEOUT: "12"
          MAX_WORKERS: "24"
        run: |
          python3 scripts/refresh_internships.py
          python3 scripts/generate_readme.py
      - name: Commit changes
        run: |
          if git diff --quiet -- data/internships.csv data/rejected_matches.csv README.md; then
            echo "No internship changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/internships.csv data/rejected_matches.csv README.md
          git commit -m "Refresh design internships"
          git push
